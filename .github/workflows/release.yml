name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
#          - target: aarch64-unknown-linux-gnu
#            os: ubuntu-latest
#            archive: tar.gz
#            cross: true
#          - target: x86_64-apple-darwin
#            os: macos-latest
#            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-release-

      - name: Install cross
        if: matrix.cross
        run: cargo install cross

      - name: Build server
        run: ${{ matrix.cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }} -p yap-server

      - name: Build CLI
        run: ${{ matrix.cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }} -p yap-cli

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/yap-server dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/yap dist/ 2>/dev/null || true
          tar -czf yap-orange-${{ github.ref_name }}-${{ matrix.target }}.tar.gz -C dist .

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/yap-server.exe" -Destination dist/ -ErrorAction SilentlyContinue
          Copy-Item "target/${{ matrix.target }}/release/yap.exe" -Destination dist/ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist/* -DestinationPath "yap-orange-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yap-orange-${{ matrix.target }}
          path: yap-orange-${{ github.ref_name }}-${{ matrix.target }}.*

  build-desktop:
    name: Desktop ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            bundles: deb,appimage
          - platform: macos-arm64
            os: macos-latest
            bundles: dmg
          - platform: windows-x64
            os: windows-latest
            bundles: msi,nsis

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-desktop-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-desktop-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Tauri CLI
        uses: cargo-bins/cargo-binstall@main

      - run: cargo binstall tauri-cli --no-confirm

      - name: Build frontend
        working-directory: web
        run: npm ci && npm run build

      - name: Build desktop app
        shell: bash
        working-directory: crates/yap-desktop
        run: cargo tauri build --bundles ${{ matrix.bundles }} --config '{"build":{"beforeBuildCommand":""}}'

      - name: Collect bundles
        shell: bash
        run: |
          mkdir -p desktop-dist
          find target/release/bundle -type f \( -name '*.deb' -o -name '*.AppImage' -o -name '*.dmg' -o -name '*.msi' -o -name '*.exe' \) -exec cp {} desktop-dist/ \; 2>/dev/null || true
          ls -la desktop-dist/

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yap-orange-desktop-${{ matrix.platform }}
          path: desktop-dist/*

  release:
    needs: [build, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
