services:
  postgres:
    image: postgres:16
    container_name: yap-postgres
    environment:
      POSTGRES_USER: yap
      POSTGRES_PASSWORD: yap
      POSTGRES_DB: yap
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yap -d yap"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
